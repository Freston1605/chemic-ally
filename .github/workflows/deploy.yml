name: ChemicAlly CI/CD

on:
  push:
    branches: [main, eb]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: config.settings.development
  EB_APPLICATION: chemically
  EB_ENVIRONMENT: Chemically-env
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "768125641662"

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint & Test
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Set up environment
        run: cp .env.example .env

      - name: Lint (Flake8)
        run: flake8 .

      - name: Django deploy checks
        run: python manage.py check --deploy

      - name: Run tests (pytest)
        run: pytest -v

  # ─────────────────────────────────────────────
  # Stage 2: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/production.txt
          pip install pip-audit safety

      - name: pip-audit (vulnerability scan)
        run: pip-audit --format json --output pip-audit-results.json || true

      - name: Safety check (known vulnerabilities)
        run: safety check --json --output safety-results.json || true

      - name: Upload scan results
        uses: actions/upload-artifact@v5
        with:
          name: security-scan-results
          path: |
            pip-audit-results.json
            safety-results.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Stage 3: Build & Artifact
  # ─────────────────────────────────────────────
  build:
    name: Build Deploy Package
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/eb'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/production.txt

      - name: Collect static files
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          AWS_S3_REGION_NAME: ${{ env.AWS_REGION }}
        run: python manage.py collectstatic --noinput

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".gitignore" \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".pytest_cache/*" \
            -x "db.sqlite3" \
            -x "django.log" \
            -x ".env" \
            -x ".env.example" \
            -x "OPS_PLAYBOOK.md" \
            -x "Agents.md" \
            -x "AGENTS.md" \
            -x ".platform/hooks/*"

      - name: Upload deploy package
        uses: actions/upload-artifact@v5
        with:
          name: eb-deploy-package
          path: deploy.zip
          retention-days: 14

  # ─────────────────────────────────────────────
  # Stage 4: Deploy to Elastic Beanstalk
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/eb'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Download deploy package
        uses: actions/download-artifact@v5
        with:
          name: eb-deploy-package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate version label
        id: version
        run: echo "label=build-${GITHUB_SHA:0:7}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Upload package to S3
        run: |
          aws s3 cp deploy.zip \
            "s3://elasticbeanstalk-${{ env.AWS_REGION }}-${{ env.AWS_ACCOUNT_ID }}/${{ env.EB_APPLICATION }}/${{ steps.version.outputs.label }}.zip"

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-label "${{ steps.version.outputs.label }}" \
            --source-bundle S3Bucket="elasticbeanstalk-${{ env.AWS_REGION }}-${{ env.AWS_ACCOUNT_ID }}",S3Key="${{ env.EB_APPLICATION }}/${{ steps.version.outputs.label }}.zip" \
            --description "Deployed from ${{ github.sha }} by ${{ github.actor }}"

      - name: Deploy to environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ env.EB_ENVIRONMENT }} \
            --version-label "${{ steps.version.outputs.label }}"

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-name ${{ env.EB_ENVIRONMENT }}

      - name: Verify deployment health
        run: |
          HEALTH=$(aws elasticbeanstalk describe-environment-health \
            --environment-name ${{ env.EB_ENVIRONMENT }} \
            --attribute-names HealthStatus \
            --query 'HealthStatus' \
            --output text)
          echo "Environment health: $HEALTH"
          if [ "$HEALTH" != "Ok" ]; then
            echo "WARNING: Environment health is '$HEALTH' after deployment"
            exit 1
          fi
