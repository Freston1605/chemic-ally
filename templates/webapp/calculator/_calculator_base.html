{% extends 'webapp/base.html' %}

{% block main %}
<div class="my-3">
  <div class="calculator-layout{% block calculator_layout_class %}{% endblock %}">
    <!-- Form card -->
    <div class="form-card-col">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h2 class="card-title mb-4">{% block calculator_title %}{% endblock %}</h2>
          <div class="flex-grow-1">
            {% block calculator_form %}{% endblock %}
          </div>
          <button
            type="submit"
            form="calculator-form"
            class="btn btn-primary mt-auto align-self-end"
            id="calculate-btn"
          >
            <span class="btn-text">Calculate</span>
            <span class="btn-spinner spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
    <!-- Result card: rendered by child templates -->
    {% block calculator_result %}{% endblock %}
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
  var form = document.getElementById('calculator-form');
  var btn = document.getElementById('calculate-btn');
  if (!form || !btn) return;
  form.addEventListener('submit', function() {
    btn.disabled = true;
    btn.querySelector('.btn-text').textContent = 'Calculating\u2026';
    btn.querySelector('.btn-spinner').classList.remove('d-none');
    btn.setAttribute('aria-busy', 'true');
  });
})();
</script>
{% endblock %}
