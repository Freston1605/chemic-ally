name: ChemicAlly CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: config.settings.development
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "768125641662"
  ECR_REPOSITORY: chemically
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # Stage 1a: Lint (independent)
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Lint (Flake8)
        run: flake8 .

  # ─────────────────────────────────────────────
  # Stage 1b: Test (independent of lint)
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Set up environment
        run: cp .env.example .env

      - name: Django deploy checks
        run: python manage.py check --deploy

      - name: Run tests (pytest)
        run: pytest -v

  # ─────────────────────────────────────────────
  # Stage 2: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-lambda.txt
          pip install pip-audit safety

      - name: pip-audit (vulnerability scan)
        run: pip-audit --format json --output pip-audit-results.json || true

      - name: Safety check (known vulnerabilities)
        run: safety check --json --output safety-results.json || true

      - name: Upload scan results
        uses: actions/upload-artifact@v6
        with:
          name: security-scan-results
          path: |
            pip-audit-results.json
            safety-results.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Stage 3: Build & Push
  # ─────────────────────────────────────────────
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-lambda.txt

      - name: Collect static files
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          AWS_S3_REGION_NAME: ${{ env.AWS_REGION }}
        run: python manage.py collectstatic --noinput

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".gitignore" \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".pytest_cache/*" \
            -x "db.sqlite3" \
            -x "django.log" \
            -x ".env" \
            -x ".env.example" \
            -x "OPS_PLAYBOOK.md" \
            -x "Agents.md" \
            -x "AGENTS.md" \
            -x ".platform/hooks/*"

      - name: Upload deploy package
        uses: actions/upload-artifact@v6
        with:
          name: deploy-metadata
          path: |
            template.yaml
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 4: Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Download deploy package
        uses: actions/download-artifact@v7
        with:
          name: eb-deploy-package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy with SAM
        uses: aws-actions/setup-sam@v2
        with:
          version: latest

      - name: SAM deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name chemically \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_REGION }} \
            --parameter-overrides \
              ImageTag=${{ env.IMAGE_TAG }} \
              HostedZoneId=${{ secrets.ROUTE53_HOSTED_ZONE_ID }} \
              RDSPassword=${{ secrets.RDS_PASSWORD }} \
              DjangoSecretKey=${{ secrets.DJANGO_SECRET_KEY }} \
            --no-fail-on-empty-changeset

      - name: Verify deployment
        run: |
          echo "Deployment initiated. Check the AWS Lambda console for status."
          aws lambda get-function \
            --function-name chemically-DjangoFunction-* \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.LastUpdateStatus' \
            --output text || echo "Function still updating..."
