{% extends 'webapp/base.html' %}

{% block main %}
  <div class="my-3">
    <div class="row justify-content-center">
      <!-- Form card -->
      <div class="col-xl-6 col-lg-6 col-md-12 mb-3 form-card-col">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <h4 class="card-title mb-4">{% block calculator_title %}{% endblock %}</h4>
            <div class="flex-grow-1">
              {% block calculator_form %}{% endblock %}
            </div>
            <button type="submit" form="calculator-form" class="btn btn-primary mt-auto align-self-end">Calculate</button>
          </div>
        </div>
      </div>
      <!-- Result card: rendered by child templates -->
      {% block calculator_result %}{% endblock %}
    </div>
  </div>
{% endblock %}
